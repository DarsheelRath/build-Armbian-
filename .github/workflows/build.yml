name: "Build Custom Orange Pi Zero 2W Image"

on:
  workflow_dispatch:

jobs:
  build-armbian:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Bring in your forked files (including armbian-firstrun-config.template)
      - name: Checkout Your Fork
        uses: actions/checkout@v4

      # Step 2: Inject your template configuration directly into userpatches/
      - name: Stage Custom Configurations
        run: |
          mkdir -p userpatches
          if [ -f armbian-firstrun-config.template ]; then
            cp armbian-firstrun-config.template userpatches/
          fi

      # Step 3: Trigger the compiler tool locally without downloading a duplicate repo
      - name: Run Build in Docker Container
        run: |
          ./compile.sh \
            BOARD=orangepizero2w \
            RELEASE=resolute \
            BRANCH=current \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=yes \
            KERNEL_ONLY=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUT=xz

      # Step 4: Save the final compiled image
      - name: Upload Finished Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orange-pi-zero-2w-resolute-image
          path: output/images/*.xz
