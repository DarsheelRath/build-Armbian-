name: "Build Custom Orange Pi Zero 2W Image"

on:
  workflow_dispatch:

jobs:
  build-armbian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Armbian Image
        uses: armbian/build@main
        with:
          armbian_token: "${{ secrets.GITHUB_TOKEN }}"
          armbian_target: "build"
          armbian_board: "orangepizero2w"
          armbian_release: "resolute"  # Builds Ubuntu 26.04 LTS Resolute Base
          armbian_branch: "edge"
          armbian_ui: "minimal"
