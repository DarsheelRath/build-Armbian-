name: "Build Custom Orange Pi Zero 2W Image"

on:
  workflow_dispatch:

jobs:
  build-armbian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Fork
        uses: actions/checkout@v4

      # CRITICAL FIX: Registers and unlocks the kernel cross-compilation layer
      - name: Set up QEMU User Static Emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Stage Custom Configurations
        run: |
          mkdir -p userpatches
          if [ -f armbian-firstrun-config.template ]; then
            cp armbian-firstrun-config.template userpatches/
          fi

      - name: Run Build in Docker Container
        run: |
          ./compile.sh \
            BOARD=orangepizero2w \
            RELEASE=resolute \
            BRANCH=current \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=yes \
            KERNEL_ONLY=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUT=xz

       Cavil-Step: Upload Finished Image Artifact
      - name: Upload Finished Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orange-pi-zero-2w-resolute-image
          path: output/images/*.xz
