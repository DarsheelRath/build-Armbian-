name: Build Armbian Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board: "orangepizero2w"
          armbian_release: "resolute"
          armbian_kernel_branch: "edge"      # Correct parameter for the experimental kernel
          armbian_target: "build"
          armbian_ui: "minimal"
          armbian_runner_clean: "yes"
